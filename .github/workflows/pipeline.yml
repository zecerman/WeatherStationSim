name: Weather Station Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weatheruser
          POSTGRES_PASSWORD: weatherpass
          POSTGRES_DB: weatherdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U weatheruser -d weatherdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests flask psycopg2-binary

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node.js dependencies
        run: |
          npm install

      - name: Build check
        run: |
          python -m py_compile sensor.py sampler.py transformer.py rest_api.py run.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create database table
        env:
          PGPASSWORD: weatherpass
        run: |
          psql -h localhost -U weatheruser -d weatherdb -c "
          CREATE TABLE IF NOT EXISTS weather_data (
              id SERIAL PRIMARY KEY,
              timestamp BIGINT,
              voltage REAL,
              temperature REAL
          );"

      - name: Start Node.js sampler server
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Start REST API
        env:
          DB_HOST: localhost
          DB_NAME: weatherdb
          DB_USER: weatheruser
          DB_PASSWORD: weatherpass
        run: |
          python rest_api.py > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for servers to start
        run: |
          sleep 5

      - name: Run Node.js unit tests
        run: |
          npm test

      - name: Run integration test
        run: |
          python -c "
          import requests
          payload = {
              'timestamp': 1234567890,
              'voltage': 120.0,
              'temperature': 60.0
          }
          response = requests.post('http://127.0.0.1:5000/weather', json=payload)
          print('Status:', response.status_code)
          print('Body:', response.text)
          assert response.status_code == 201
          "

      - name: Show Node server log
        if: always()
        run: |
          cat server.log || true

      - name: Show REST API log
        if: always()
        run: |
          cat api.log || true

      - name: Stop Node server
        if: always()
        run: |
          kill $(cat server.pid) || true

      - name: Stop REST API
        if: always()
        run: |
          kill $(cat api.pid) || true
# Print status of pipeline health to the terminal, 
# this basically tells us if our project ran from head to toe without fault
      - name: Report success
        if: success()
        run: echo "Pipeline completed."

      - name: Report failure
        if: failure()
        run: echo "Pipeline failed."